<body class="slide-page">
<h2>بازخورد</h2>
<p style="margin-bottom:20px;font-size:14px;color:var(--color-text-muted)">هشدارها، اعلان‌ها و وضعیت</p>
<div class="alert-group" style="margin-bottom:24px">
<aside class="alert-succ"><h4>موفقیت</h4><p>عملیات با موفقیت انجام شد.</p></aside>
<aside class="alert-err"><h4>خطا</h4><p>خطایی رخ داده است.</p></aside>

</div>
<aside style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-radius:10px;background:color-mix(in srgb,var(--color-primary),transparent 85%);border:1px solid var(--color-border);font-size:13px;max-width:400px">
<p style="font-weight:700;color:var(--color-primary);display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--color-primary)"></span>همه سامانه‌ها عملیاتی</p>
<p style="color:var(--color-text-muted);font-size:12px">۱۰۰٪ عملیاتی · ۳۰ روز گذشته</p>
</aside>
