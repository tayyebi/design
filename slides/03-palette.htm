<body class="slide-page">
<h2>پالت رنگی</h2>
<p style="margin-bottom:20px;font-size:14px;color:var(--color-text-muted)">در حالت روشن، سبز طیف اصلی و قرمز ثانویه است. در حالت تاریک، قرمز طیف اصلی و سبز ثانویه می‌شود</p>
<ul class="color-grid">
<li>
<figure>
<div class="swatch-forest"><strong>اصلی</strong><strong>ثانویه</strong></div>
<figcaption><strong>سبز جنگلی</strong><p>رنگ پایه برند</p><dl><dt>Hex</dt><dd>#174c38</dd></dl></figcaption>
</figure>
</li>
<li>
<figure>
<div class="swatch-ember"><strong>ثانویه</strong><strong>اصلی</strong></div>
<figcaption><strong>سرخ</strong><p>اکسنت پرانرژی</p><dl><dt>Hex</dt><dd>#af231c</dd></dl></figcaption>
</figure>
</li>
<li>
<figure>
<div class="swatch-amber"><strong>اکسنت</strong></div>
<figcaption><strong>طلایی</strong><p>هایلایت گرم</p><dl><dt>Hex</dt><dd>#f2b534</dd></dl></figcaption>
</figure>
</li>
<li>
<figure>
<div class="swatch-mint"><strong>تینت</strong></div>
<figcaption><strong>نعنایی</strong><p>پس‌زمینه ملایم</p><dl><dt>Hex</dt><dd>#afc2bb</dd></dl></figcaption>
</figure>
</li>
<li>
<figure>
<div class="swatch-blush"><strong>تینت</strong></div>
<figcaption><strong>رز</strong><p>تینت گرم</p><dl><dt>Hex</dt><dd>#dda19d</dd></dl></figcaption>
</figure>
</li>
<li>
<figure>
<div class="swatch-navy"><strong>ثانویه</strong></div>
<figcaption><strong>آبی ایرانی</strong><p>عناصر پشتیبان</p><dl><dt>Hex</dt><dd>#1c39bb</dd></dl></figcaption>
</figure>
</li>
<li>
<figure>
<div class="swatch-cream"><strong>پس‌زمینه</strong></div>
<figcaption><strong>کرم</strong><p>بافت گرم و ملایم</p><dl><dt>Hex</dt><dd>#fefdfc</dd></dl></figcaption>
</figure>
</li>
</ul>
