<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کیت برند — سامانه طراحی</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="slides.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lalezar&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/sahel-font@v3.4.0/dist/font-face.css">
</head>
<body>

<iframe id="slide-frame" title="اسلاید‌های سامانه طراحی" loading="eager"></iframe>

<nav role="region" aria-label="کنترل اسلاید">
  <button id="prev" aria-label="قبلی">‹</button>
  <span id="counter" aria-live="polite">1 / 35</span>
  <input type="checkbox" role="switch" id="theme-toggle" checked aria-label="تغییر تم">
  <ol role="tablist" id="dots" aria-label="اندیکاتور اسلاید"></ol>
  <button id="next" aria-label="بعدی">›</button>
</nav>

<script src="slides.js"></script>
</body>
</html>
